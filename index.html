
<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">

    
  </head>
  <body>
    <div class="webgl-wrapper">
      <div class="aspect"></div>
      <div class="webgl-content">
        <div id="unityContainer">
          <canvas id="unity-canvas" style="background: #231F20"></canvas>
        </div>
      </div>
    </div>

    <div class="info">
      <p><a href="#" onclick="myGameInstance.SetFullscreen(1)">Please click here</a> to toggle fullscreen</p>
    </div>
    
   <script src="MyLoader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/WebGl_MobileDevice.data.gz",
        frameworkUrl: "Build/WebGl_MobileDevice.framework.js.gz",
        codeUrl: "Build/WebGl_MobileDevice.wasm.gz",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Board Game",
        productVersion: "0.1",
      }).then((unityInstance) => {
        myGameInstance = unityInstance;
      });
    </script>


<!-- THIS IS MY CUSTOM FUN -->

<script>
    
      document.addEventListener('mousedown', function() {
                  
            console.log("This is my fullscreen Log");
            console.log(myGameInstance);    
            myGameInstance.SetFullscreen(1);

             
      });
</script>


  </body>
</html>
